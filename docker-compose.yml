services:
  db:
    image: postgres:14
    container_name: postgres_14_db_kursach
    restart: always
    env_file:
      - backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: always
    env_file:
      - backend/.env
    environment:
      - PYTHONPATH=/app
    command: python3 -m backend.main

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    stdin_open: true
    tty: true
    ports:
      - "3000:3000"
    command: npm start
    depends_on:
      - db
      - backend
    restart: always

volumes:
  postgres_data:

